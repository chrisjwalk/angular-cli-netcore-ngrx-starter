<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Demo App</title>
  <base href="/" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1, shrink-to-fit=no" />

  <meta name="mobile-web-app-capable"
        content="yes" />
  <meta name="apple-mobile-web-app-capable"
        content="yes" />
  <meta name="application-name"
        content="Demo App" />
  <meta name="apple-mobile-web-app-title"
        content="Demo App" />
  <meta name="theme-color"
        content="#f8f9fa"
        media="(prefers-color-scheme: light)" />
  <meta name="theme-color"
        content="#131313"
        media="(prefers-color-scheme: dark)" />
  <meta name="msapplication-navbutton-color"
        content="#fafafa" />
  <meta name="apple-mobile-web-app-status-bar-style"
        content="black-translucent" />

        content="/" />
  <meta name="description"
        content="A starter template using Angular, Angular Material, NgRx Signals, Nx monorepo, and .NET — demonstrating modern tooling and best practices." />

  <!-- Open Graph / Social sharing -->
  <meta property="og:type"
        content="website" />
  <meta property="og:title"
        content="Angular + NgRx + .NET Starter" />
  <meta property="og:description"
        content="A starter template using Angular, Angular Material, NgRx Signals, Nx monorepo, and .NET — demonstrating modern tooling and best practices." />

  <link rel="apple-touch-icon"
        href="assets/icons/icon-192x192.png" />
  <link rel="icon"
        type="image/x-icon"

  <link rel="preconnect"
        href="https://fonts.googleapis.com" />
  <link rel="preconnect"
        href="https://fonts.gstatic.com"

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500&display=swap"

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap"
        rel="stylesheet" />
  <link rel="manifest"
        href="manifest.webmanifest" />
